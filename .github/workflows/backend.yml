# Backend: build Docker image, push to ECR, update image tag in Git — ArgoCD syncs automatically (GitOps)
name: Backend (ECR + EKS)

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "shared/**"
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - "requirements.txt"
      - "drizzle.config.ts"
      - "models/**"
      - "data/**"
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'reposition' }}
  EKS_CLUSTER: ${{ vars.EKS_CLUSTER || 'reposition' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run check

      - name: Run tests
        run: npm run test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update image tag in Git (GitOps)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sed -i 's/tag: ".*"/tag: "${{ github.sha }}"/' k8s/charts/reposition/values-production.yaml
          git add k8s/charts/reposition/values-production.yaml
          git diff --staged --quiet || git commit -m "chore(backend): update image tag to ${{ github.sha }} [skip ci]"
          git push
